<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Classements</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070810;--bg2:#0e0f1a;--bg3:#15172a;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --white:#f0f2ff;--muted:#555878;--muted2:#7a7e9a;
  --c:#00e5ff;--p:#a855f7;--g:#00ff9d;--y:#ffe600;--r:#ff3d71;--o:#ff8c00;
  --fd:'Bebas Neue',sans-serif;--fb:'Outfit',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;cursor:none;}

/* CURSOR */
#cur{width:10px;height:10px;background:var(--white);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);will-change:transform;mix-blend-mode:difference;transition:width .18s,height .18s;}
#cur-ring{width:34px;height:34px;border:1px solid rgba(255,255,255,.25);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);will-change:transform;transition:width .22s,height .22s;}

/* NOISE */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

/* GRID BG */
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);pointer-events:none;z-index:0;}

/* NAV */
nav{position:sticky;top:0;z-index:200;height:62px;display:flex;align-items:center;padding:0 40px;background:rgba(7,8,16,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);gap:16px;}
.logo{font-family:var(--fd);font-size:30px;letter-spacing:4px;background:linear-gradient(90deg,var(--c),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;margin-right:auto;}
.back-btn{padding:7px 16px;border-radius:9px;background:none;border:1px solid var(--border);color:var(--muted2);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.back-btn:hover{color:var(--white);border-color:var(--border2);}
#nav-user{display:none;align-items:center;gap:10px;}
#nav-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;cursor:pointer;transition:transform .2s;}
#nav-av:hover{transform:scale(1.1);}
#nav-name{font-size:13px;color:rgba(255,255,255,.5);}
.nav-my-rank{padding:6px 14px;border-radius:8px;background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.15);color:var(--g);font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;}
.nav-my-rank:hover{background:rgba(0,255,157,.15);}

/* MAIN */
main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:60px 32px 100px;}

/* HERO */
.hero{text-align:center;margin-bottom:56px;animation:fadeUp .5s ease both;}
.hero-label{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:20px;background:rgba(0,255,157,.08);border:1px solid rgba(0,255,157,.15);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:20px;}
.hero-title{font-family:var(--fd);font-size:clamp(60px,10vw,120px);letter-spacing:5px;line-height:.88;margin-bottom:14px;}
.ht1{display:block;color:var(--white);}
.ht2{display:block;background:linear-gradient(90deg,var(--g),var(--c),var(--p));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gShift 5s linear infinite;}
@keyframes gShift{0%{background-position:0%}100%{background-position:200%}}
.hero-sub{font-size:15px;color:var(--muted2);font-weight:300;max-width:500px;margin:0 auto 28px;}

/* TABS */
.tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;animation:fadeUp .5s .1s ease both;}
.tab-btn{padding:9px 20px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted2);font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--white);border-color:var(--border2);background:rgba(255,255,255,.04);}
.tab-btn.active{color:var(--white);border-color:transparent;}
.tab-btn.active[data-tab="global"]{background:linear-gradient(135deg,rgba(0,255,157,.15),rgba(0,229,255,.1));border-color:rgba(0,255,157,.3);}
.tab-btn.active[data-tab="chat"]{background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(168,85,247,.1));border-color:rgba(0,229,255,.3);}
.tab-btn.active[data-tab="games"]{background:linear-gradient(135deg,rgba(255,61,113,.15),rgba(255,230,0,.1));border-color:rgba(255,61,113,.3);}
.tab-btn.active[data-tab="music"]{background:linear-gradient(135deg,rgba(255,230,0,.15),rgba(255,140,0,.1));border-color:rgba(255,230,0,.3);}
.tab-btn.active[data-tab="blind"]{background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(255,61,113,.1));border-color:rgba(168,85,247,.3);}

/* SECTION */
.section{display:none;animation:fadeUp .3s ease both;}
.section.on{display:block;}

/* PODIUM */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:40px;padding:0 20px;}
.pod-item{display:flex;flex-direction:column;align-items:center;flex:1;max-width:200px;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.3,.64,1);}
.pod-item:hover{transform:translateY(-6px);}
.pod-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--fb);border:3px solid transparent;position:relative;margin-bottom:10px;overflow:hidden;}
.pod-av img{width:100%;height:100%;object-fit:cover;}
.pod-crown{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:22px;filter:drop-shadow(0 0 8px rgba(255,215,0,.6));}
.pod-medal{font-size:18px;margin-bottom:6px;}
.pod-name{font-family:var(--fd);letter-spacing:1.5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.pod-score-label{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.pod-score-val{font-family:var(--fd);letter-spacing:1px;}
.pod-base{border-radius:14px 14px 0 0;width:100%;margin-top:10px;}

/* #1 */
.pod-item.p1 .pod-av{width:88px;height:88px;font-size:30px;border-color:var(--y);box-shadow:0 0 30px rgba(255,215,0,.25);}
.pod-item.p1 .pod-name{font-size:20px;color:var(--y);}
.pod-item.p1 .pod-score-val{font-size:22px;color:var(--y);}
.pod-item.p1 .pod-base{height:110px;background:linear-gradient(180deg,rgba(255,215,0,.12),rgba(255,215,0,.04));border:1px solid rgba(255,215,0,.2);}
/* #2 */
.pod-item.p2 .pod-av{width:72px;height:72px;font-size:24px;border-color:#c0c0c0;box-shadow:0 0 20px rgba(192,192,192,.15);}
.pod-item.p2 .pod-name{font-size:17px;color:#c0c0c0;}
.pod-item.p2 .pod-score-val{font-size:18px;color:#c0c0c0;}
.pod-item.p2 .pod-base{height:80px;background:linear-gradient(180deg,rgba(192,192,192,.08),rgba(192,192,192,.02));border:1px solid rgba(192,192,192,.15);}
/* #3 */
.pod-item.p3 .pod-av{width:64px;height:64px;font-size:22px;border-color:#cd7f32;box-shadow:0 0 16px rgba(205,127,50,.12);}
.pod-item.p3 .pod-name{font-size:15px;color:#cd7f32;}
.pod-item.p3 .pod-score-val{font-size:16px;color:#cd7f32;}
.pod-item.p3 .pod-base{height:60px;background:linear-gradient(180deg,rgba(205,127,50,.08),rgba(205,127,50,.02));border:1px solid rgba(205,127,50,.12);}

/* LISTE */
.rank-list{display:flex;flex-direction:column;gap:6px;}
.rank-row{display:flex;align-items:center;gap:14px;padding:13px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;transition:all .2s;cursor:pointer;position:relative;overflow:hidden;}
.rank-row::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;}
.rank-row:hover::before{opacity:1;}
.rank-row:hover{transform:translateX(4px);}
.rank-row.me{border-color:rgba(0,255,157,.25);background:linear-gradient(135deg,rgba(0,255,157,.06),var(--bg2));}
.rank-row.me::after{content:'TOI';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:800;letter-spacing:2px;color:var(--g);background:rgba(0,255,157,.1);border:1px solid rgba(0,255,157,.2);padding:3px 8px;border-radius:6px;}
.rank-num{font-family:var(--fd);font-size:22px;width:36px;text-align:center;flex-shrink:0;}
.rank-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;overflow:hidden;}
.rank-av img{width:100%;height:100%;object-fit:cover;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-meta{font-size:11px;color:var(--muted2);margin-top:1px;}
.rank-badge{padding:2px 8px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0;}
.rank-val{font-family:var(--fd);font-size:22px;letter-spacing:1px;flex-shrink:0;min-width:56px;text-align:right;}
.rank-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.04);}
.rank-bar{height:100%;border-radius:0 2px 2px 0;transition:width .8s cubic-bezier(.34,1,.64,1);}

/* MY RANK BANNER */
.my-rank-banner{display:none;margin-bottom:24px;padding:16px 20px;background:linear-gradient(135deg,rgba(0,255,157,.08),rgba(0,229,255,.05));border:1px solid rgba(0,255,157,.2);border-radius:14px;align-items:center;gap:14px;}
.my-rank-banner.show{display:flex;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted2);}
.empty-state .e-icon{font-size:56px;margin-bottom:16px;opacity:.4;}
.empty-state p{font-size:14px;line-height:1.7;}

/* REFRESH */
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.refresh-btn{padding:6px 14px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted2);font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.refresh-btn:hover{color:var(--white);background:rgba(255,255,255,.08);}
.last-update{font-size:11px;color:var(--muted);}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes rowIn{from{opacity:0;transform:translateX(-12px);}to{opacity:1;transform:translateX(0);}}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px;}

/* RESPONSIVE */
@media(max-width:640px){main{padding:40px 16px 80px;}.podium{gap:6px;}.hero-title{font-size:56px;}.tabs{gap:4px;}.tab-btn{padding:7px 12px;font-size:12px;}}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-ring"></div>

<nav>
  <div class="logo" onclick="window.location.href='nexus-home.html'">NEXUS</div>
  <button class="back-btn" onclick="window.location.href='nexus-home.html'">← Accueil</button>
  <div id="nav-user">
    <div id="nav-av"></div>
    <span id="nav-name"></span>
    <button class="nav-my-rank" id="nav-myrank-btn" onclick="scrollToMe()">📍 Ma position</button>
  </div>
</nav>

<main>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-label">🏆 Live Rankings</div>
    <h1 class="hero-title">
      <span class="ht1">CLASS-</span>
      <span class="ht2">EMENTS</span>
    </h1>
    <p class="hero-sub">Les meilleurs membres de Nexus, classés par catégorie. Qui est en tête cette semaine ?</p>
    <div id="hero-stats" style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="global" onclick="switchTab('global')">🌍 Global</button>
    <button class="tab-btn" data-tab="chat" onclick="switchTab('chat')">💬 Chatteurs</button>
    <button class="tab-btn" data-tab="games" onclick="switchTab('games')">🎮 Joueurs</button>
    <button class="tab-btn" data-tab="music" onclick="switchTab('music')">🎵 Musique</button>
    <button class="tab-btn" data-tab="blind" onclick="switchTab('blind')">🎯 Blind Test</button>
  </div>

  <!-- ═══ GLOBAL ═══ -->
  <div class="section on" id="sec-global">
    <div class="refresh-row">
      <div class="last-update" id="upd-global"></div>
      <button class="refresh-btn" onclick="buildAll()">⟳ Actualiser</button>
    </div>
    <div class="my-rank-banner" id="banner-global">
      <div id="banner-global-av" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:12px;color:var(--g);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">Ta position</div>
        <div id="banner-global-txt" style="font-size:14px;font-weight:600;"></div>
      </div>
      <div id="banner-global-score" style="font-family:var(--fd);font-size:28px;color:var(--g);"></div>
    </div>
    <div class="podium" id="pod-global"></div>
    <div class="rank-list" id="list-global"></div>
  </div>

  <!-- ═══ CHAT ═══ -->
  <div class="section" id="sec-chat">
    <div class="refresh-row">
      <div class="last-update" id="upd-chat"></div>
      <button class="refresh-btn" onclick="buildAll()">⟳ Actualiser</button>
    </div>
    <div class="my-rank-banner" id="banner-chat">
      <div id="banner-chat-av" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:12px;color:var(--c);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">Ta position</div>
        <div id="banner-chat-txt" style="font-size:14px;font-weight:600;"></div>
      </div>
      <div id="banner-chat-score" style="font-family:var(--fd);font-size:28px;color:var(--c);"></div>
    </div>
    <div class="podium" id="pod-chat"></div>
    <div class="rank-list" id="list-chat"></div>
  </div>

  <!-- ═══ GAMES ═══ -->
  <div class="section" id="sec-games">
    <div class="refresh-row">
      <div class="last-update" id="upd-games"></div>
      <button class="refresh-btn" onclick="buildAll()">⟳ Actualiser</button>
    </div>
    <div class="my-rank-banner" id="banner-games">
      <div id="banner-games-av" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:12px;color:var(--r);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">Ta position</div>
        <div id="banner-games-txt" style="font-size:14px;font-weight:600;"></div>
      </div>
      <div id="banner-games-score" style="font-family:var(--fd);font-size:28px;color:var(--r);"></div>
    </div>
    <div class="podium" id="pod-games"></div>
    <div class="rank-list" id="list-games"></div>
  </div>

  <!-- ═══ MUSIC ═══ -->
  <div class="section" id="sec-music">
    <div class="refresh-row">
      <div class="last-update" id="upd-music"></div>
      <button class="refresh-btn" onclick="buildAll()">⟳ Actualiser</button>
    </div>
    <div class="my-rank-banner" id="banner-music">
      <div id="banner-music-av" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:12px;color:var(--y);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">Ta position</div>
        <div id="banner-music-txt" style="font-size:14px;font-weight:600;"></div>
      </div>
      <div id="banner-music-score" style="font-family:var(--fd);font-size:28px;color:var(--y);"></div>
    </div>
    <div class="podium" id="pod-music"></div>
    <div class="rank-list" id="list-music"></div>
  </div>

  <!-- ═══ BLIND TEST ═══ -->
  <div class="section" id="sec-blind">
    <div class="refresh-row">
      <div class="last-update" id="upd-blind"></div>
      <button class="refresh-btn" onclick="buildAll()">⟳ Actualiser</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:32px;" id="blind-mode-cards"></div>
    <div class="my-rank-banner" id="banner-blind">
      <div id="banner-blind-av" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;"></div>
      <div style="flex:1;">
        <div style="font-size:12px;color:var(--p);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">Ton meilleur score</div>
        <div id="banner-blind-txt" style="font-size:14px;font-weight:600;"></div>
      </div>
      <div id="banner-blind-score" style="font-family:var(--fd);font-size:28px;color:var(--p);"></div>
    </div>
    <div class="podium" id="pod-blind"></div>
    <div class="rank-list" id="list-blind"></div>
  </div>

</main>

<script src="nexus-user-popup.js"></script>
<script>
// ═══════════════════════════════
//  DATA LAYER
// ═══════════════════════════════
const AV_GRADIENTS=[
  'linear-gradient(135deg,#00e5ff,#7c6aff)',
  'linear-gradient(135deg,#ff3d71,#ffe600)',
  'linear-gradient(135deg,#00ff9d,#00e5ff)',
  'linear-gradient(135deg,#ffe600,#ff3d71)',
  'linear-gradient(135deg,#7c6aff,#ff6aff)',
  'linear-gradient(135deg,#ff8c00,#ff3d71)',
];
function avGrad(n){let h=0;for(const c of(n||'?'))h=(h*31+c.charCodeAt(0))|0;return AV_GRADIENTS[Math.abs(h)%AV_GRADIENTS.length];}
function avLetter(n){return(n||'?')[0].toUpperCase();}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function fmt(n){if(n>=1000)return(n/1000).toFixed(1)+'k';return String(n);}

function getSession(){
  try{return JSON.parse(localStorage.getItem('nexus_session')||sessionStorage.getItem('nexus_session')||'null');}catch{return null;}
}
function getUserDB(){
  try{return JSON.parse(localStorage.getItem('nexus_db')||'{"users":[]}')||{users:[]};}catch{return{users:[]};}
}
function getChatDB(){
  try{return JSON.parse(localStorage.getItem('nx_chat')||'null');}catch{return null;}
}
function getMusicMeta(){
  try{return JSON.parse(localStorage.getItem('nx_music')||'null');}catch{return null;}
}

// Calcule le nombre de messages d'un user dans tous les salons
function countMessages(pseudo,chatDB){
  if(!chatDB||!chatDB.messages) return 0;
  return Object.values(chatDB.messages).reduce((sum,arr)=>
    sum+arr.filter(m=>m.pseudo?.toLowerCase()===pseudo.toLowerCase()).length,0);
}

// Profil perso (avatar/bio) — stocké sous nexus_profile_<id>
function getProfile(userId){
  try{return JSON.parse(localStorage.getItem('nexus_profile_'+userId)||localStorage.getItem('nexus_profile')||'{}');}catch{return{};}
}

// Construit le score global : msgs + victoires*3 + sons*2 + blindScore/10
function globalScore(u, chatDB, musicMeta){
  const msgs=countMessages(u.pseudo,chatDB);
  const wins=u.gameWins||0;
  const sounds=musicMeta?(musicMeta.tracks||[]).filter(t=>t.addedBy?.toLowerCase()===u.pseudo?.toLowerCase()).length:0;
  const blind=Math.max(
    parseInt(localStorage.getItem('nx_bt_easy_'+u.id)||'0'),
    parseInt(localStorage.getItem('nx_bt_normal_'+u.id)||'0'),
    parseInt(localStorage.getItem('nx_bt_hard_'+u.id)||'0')
  );
  return msgs + wins*3 + sounds*2 + Math.floor(blind/10);
}

// Compte les sons ajoutés par un user
function countSounds(pseudo, musicMeta){
  if(!musicMeta) return 0;
  return (musicMeta.tracks||[]).filter(t=>t.addedBy?.toLowerCase()===pseudo.toLowerCase()).length;
}

// Meilleur score blind test d'un user (stocké par pseudo + id)
function bestBlindScore(u){
  // Cherche dans les différentes clés possibles
  const keys=[
    'nx_bt_easy_'+u.id,'nx_bt_normal_'+u.id,'nx_bt_hard_'+u.id,
    'nx_bt_easy','nx_bt_normal','nx_bt_hard' // clés legacy (pour le user courant)
  ];
  let max=0;
  const session=getSession();
  for(const k of keys){
    // Les clés legacy ne s'appliquent qu'au user connecté
    if((k==='nx_bt_easy'||k==='nx_bt_normal'||k==='nx_bt_hard')&&session?.id!==u.id) continue;
    const v=parseInt(localStorage.getItem(k)||'0');
    if(v>max)max=v;
  }
  return max;
}

// ═══════════════════════════════
//  BUILD LEADERBOARD DATA
// ═══════════════════════════════
let DATA={};
let SESSION=null;

function buildAll(){
  SESSION=getSession();
  const userDB=getUserDB();
  const chatDB=getChatDB();
  const musicMeta=getMusicMeta();
  const users=userDB.users||[];

  if(!users.length){
    ['global','chat','games','music','blind'].forEach(k=>showEmpty(k));
    updateHeroStats(users,chatDB,musicMeta);
    return;
  }

  // ── GLOBAL ──
  DATA.global=users.map(u=>({
    ...u,
    score:globalScore(u,chatDB,musicMeta),
    msgs:countMessages(u.pseudo,chatDB),
    sounds:countSounds(u.pseudo,musicMeta),
    prof:getProfile(u.id)
  })).sort((a,b)=>b.score-a.score);

  // ── CHAT ──
  DATA.chat=users.map(u=>({
    ...u,
    score:countMessages(u.pseudo,chatDB),
    prof:getProfile(u.id)
  })).filter(u=>u.score>0).sort((a,b)=>b.score-a.score);
  if(!DATA.chat.length) DATA.chat=users.map(u=>({...u,score:0,prof:getProfile(u.id)}));

  // ── GAMES ──
  DATA.games=users.map(u=>({
    ...u,
    score:u.gameWins||0,
    prof:getProfile(u.id)
  })).sort((a,b)=>b.score-a.score);

  // ── MUSIC ──
  DATA.music=users.map(u=>({
    ...u,
    score:countSounds(u.pseudo,musicMeta),
    prof:getProfile(u.id)
  })).filter(u=>u.score>0).sort((a,b)=>b.score-a.score);
  if(!DATA.music.length) DATA.music=users.map(u=>({...u,score:0,prof:getProfile(u.id)}));

  // ── BLIND TEST ──
  DATA.blind=users.map(u=>({
    ...u,
    score:bestBlindScore(u),
    prof:getProfile(u.id)
  })).sort((a,b)=>b.score-a.score);

  const now=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  ['global','chat','games','music','blind'].forEach(k=>{
    const el=document.getElementById('upd-'+k);
    if(el)el.textContent='Mis à jour à '+now;
  });

  renderSection('global', DATA.global, {color:'var(--g)', unit:'pts', label:'Score global'});
  renderSection('chat',   DATA.chat,   {color:'var(--c)', unit:'msgs', label:'Messages envoyés'});
  renderSection('games',  DATA.games,  {color:'var(--r)', unit:'🏆', label:'Victoires'});
  renderSection('music',  DATA.music,  {color:'var(--y)', unit:'🎵', label:'Sons partagés'});
  renderBlindSection();

  updateHeroStats(users,chatDB,musicMeta);
  updateNavUser();
}

// ═══════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════
function makeAv(u, size, fontSize){
  const prof=u.prof||{};
  const el=document.createElement('div');
  el.style.cssText=`width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${fontSize}px;flex-shrink:0;overflow:hidden;background:${prof.avatarSrc?'none':avGrad(u.pseudo)};`;
  if(prof.avatarSrc){
    const img=document.createElement('img');
    img.src=prof.avatarSrc;img.style.cssText='width:100%;height:100%;object-fit:cover;';
    img.onerror=()=>{el.innerHTML=avLetter(u.pseudo);el.style.background=avGrad(u.pseudo);};
    el.appendChild(img);
  } else {
    el.textContent=avLetter(u.pseudo);
  }
  return el;
}

function renderSection(key, sorted, {color, unit, label}){
  const max=sorted[0]?.score||1;
  const me=SESSION?sorted.find(u=>u.id===SESSION.id):null;
  const meIdx=me?sorted.indexOf(me):-1;

  // BANNER
  const banner=document.getElementById('banner-'+key);
  if(me&&banner){
    banner.classList.add('show');
    const av=document.getElementById('banner-'+key+'-av');
    const txt=document.getElementById('banner-'+key+'-txt');
    const sc=document.getElementById('banner-'+key+'-score');
    if(av){av.style.background=avGrad(me.pseudo);av.textContent=avLetter(me.pseudo);}
    if(me.prof?.avatarSrc&&av){av.innerHTML=`<img src="${me.prof.avatarSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
    if(txt)txt.textContent=`Tu es #${meIdx+1} sur ${sorted.length} membres — ${fmt(me.score)} ${unit}`;
    if(sc){sc.style.color=color;sc.textContent=fmt(me.score);}
  } else if(banner){
    banner.classList.remove('show');
  }

  // PODIUM (top 3)
  const podEl=document.getElementById('pod-'+key);
  if(podEl) renderPodium(podEl, sorted.slice(0,3), color, unit, me?.id);

  // LIST (rang 4+)
  const listEl=document.getElementById('list-'+key);
  if(listEl) renderList(listEl, sorted, 3, max, color, unit, label, me?.id);
}

function renderPodium(el, top3, color, unit, meId){
  el.innerHTML='';
  if(!top3.length){el.style.display='none';return;}
  el.style.display='flex';
  // Ordre visuel : 2ème, 1er, 3ème
  const order=[top3[1],top3[0],top3[2]].filter(Boolean);
  const classes=['p2','p1','p3'];
  const medals=['🥈','🥇','🥉'];
  const sizes=[[72,24],[88,30],[64,22]];

  order.forEach((u,vi)=>{
    const realIdx=top3.indexOf(u);
    const cls=classes[vi];
    const medal=medals[vi];
    const [avSize,avFs]=sizes[vi];
    const isMe=u.id===meId;

    const item=document.createElement('div');
    item.className='pod-item '+cls+(isMe?' me':'');
    item.dataset.pseudo=u.pseudo;
    item.classList.add('nx-user');
    item.title=u.pseudo;

    const av=makeAv(u,avSize,avFs);
    if(realIdx===0){
      const crown=document.createElement('div');crown.className='pod-crown';crown.textContent='👑';
      const avWrap=document.createElement('div');avWrap.style.position='relative';
      avWrap.appendChild(crown);avWrap.appendChild(av);
      item.appendChild(avWrap);
    } else {
      item.appendChild(av);
    }

    item.innerHTML+=`
      <div class="pod-medal">${medal}</div>
      <div class="pod-name">${esc(u.pseudo)}</div>
      <div class="pod-score-label">${unit}</div>
      <div class="pod-score-val">${fmt(u.score)}</div>
      <div class="pod-base"></div>`;
    el.appendChild(item);
  });
}

function renderList(el, sorted, startFrom, max, color, unit, label, meId){
  el.innerHTML='';
  const list=sorted.slice(startFrom);
  if(!list.length&&startFrom>0){el.innerHTML='';return;}
  if(!sorted.length){showEmptyInEl(el);return;}

  list.forEach((u,i)=>{
    const rank=startFrom+i+1;
    const isMe=u.id===meId;
    const pct=max>0?Math.round(u.score/max*100):0;

    const row=document.createElement('div');
    row.className='rank-row'+(isMe?' me':'');
    row.id='rankrow-'+u.id;
    row.dataset.pseudo=u.pseudo;
    row.classList.add('nx-user');
    row.style.animationDelay=(i*.03)+'s';
    row.style.animation='rowIn .3s ease both';

    // Couleur numéro
    const numColor=rank<=10?color:'var(--muted2)';

    // Badge rôle
    const roleHtml=u.role==='admin'
      ?`<span class="rank-badge" style="background:rgba(255,61,113,.12);color:var(--r);border:1px solid rgba(255,61,113,.2);">ADMIN</span>`
      :``;

    row.innerHTML=`
      <div class="rank-num" style="color:${numColor};">${rank}</div>
      <div class="rank-av" style="width:38px;height:38px;background:${u.prof?.avatarSrc?'none':avGrad(u.pseudo)};font-size:15px;"></div>
      <div class="rank-info">
        <div class="rank-name">${esc(u.pseudo)}${u.role==='admin'?' 👑':''}</div>
        <div class="rank-meta">${label} · Membre depuis ${new Date(u.joined||Date.now()).toLocaleDateString('fr-FR',{month:'short',year:'numeric'})}</div>
      </div>
      ${roleHtml}
      <div class="rank-val" style="color:${numColor};">${fmt(u.score)}</div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:0%;background:${color};"></div></div>`;

    // Avatar
    const avEl=row.querySelector('.rank-av');
    if(u.prof?.avatarSrc){
      const img=document.createElement('img');img.src=u.prof.avatarSrc;img.style.cssText='width:100%;height:100%;object-fit:cover;';
      img.onerror=()=>{avEl.textContent=avLetter(u.pseudo);avEl.style.background=avGrad(u.pseudo);};
      avEl.appendChild(img);
    } else {
      avEl.textContent=avLetter(u.pseudo);
    }

    el.appendChild(row);
    // Anime la barre après insertion
    requestAnimationFrame(()=>setTimeout(()=>{
      const bar=row.querySelector('.rank-bar');
      if(bar)bar.style.width=pct+'%';
    },50+i*30));
  });
}

function renderBlindSection(){
  const me=SESSION?DATA.blind.find(u=>u.id===SESSION.id):null;
  const meIdx=me?DATA.blind.indexOf(me):-1;
  const max=DATA.blind[0]?.score||1;
  const color='var(--p)';

  // Cartes modes
  const modeCards=document.getElementById('blind-mode-cards');
  if(modeCards){
    const modes=[
      {key:'easy',label:'Facile',icon:'🎵',col:'var(--g)',sc:SESSION?parseInt(localStorage.getItem('nx_bt_easy')||'0'):0},
      {key:'normal',label:'Normal',icon:'🎯',col:'var(--y)',sc:SESSION?parseInt(localStorage.getItem('nx_bt_normal')||'0'):0},
      {key:'hard',label:'Difficile',icon:'💀',col:'var(--r)',sc:SESSION?parseInt(localStorage.getItem('nx_bt_hard')||'0'):0},
    ];
    modeCards.innerHTML=modes.map(m=>`
      <div style="padding:18px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;text-align:center;">
        <div style="font-size:30px;margin-bottom:8px;">${m.icon}</div>
        <div style="font-family:var(--fd);font-size:18px;letter-spacing:1px;color:${m.col};margin-bottom:4px;">${m.label}</div>
        <div style="font-size:11px;color:var(--muted2);">Ton meilleur</div>
        <div style="font-family:var(--fd);font-size:28px;color:${m.col};">${SESSION?m.sc:'—'}</div>
      </div>`).join('');
  }

  // Banner
  const banner=document.getElementById('banner-blind');
  if(me&&banner&&me.score>0){
    banner.classList.add('show');
    const av=document.getElementById('banner-blind-av');
    const txt=document.getElementById('banner-blind-txt');
    const sc=document.getElementById('banner-blind-score');
    if(av){av.style.background=avGrad(me.pseudo);av.textContent=avLetter(me.pseudo);}
    if(txt)txt.textContent=`Tu es #${meIdx+1} sur ${DATA.blind.filter(u=>u.score>0).length} joueurs`;
    if(sc){sc.style.color=color;sc.textContent=me.score;}
  } else if(banner) banner.classList.remove('show');

  // Filtre que ceux qui ont joué
  const played=DATA.blind.filter(u=>u.score>0);
  const podEl=document.getElementById('pod-blind');
  const listEl=document.getElementById('list-blind');

  if(!played.length){
    if(podEl)podEl.innerHTML='';
    if(listEl){listEl.innerHTML=`<div class="empty-state"><div class="e-icon">🎯</div><p>Personne n'a encore joué au Blind Test.<br>Sois le premier à te lancer !</p></div>`;}
    return;
  }
  if(podEl) renderPodium(podEl,played.slice(0,3),color,'pts',me?.id);
  if(listEl) renderList(listEl,played,3,played[0]?.score||1,color,'pts','Meilleur score',me?.id);
}

function showEmpty(key){
  const el=document.getElementById('list-'+key);
  if(el)showEmptyInEl(el);
  const pod=document.getElementById('pod-'+key);
  if(pod)pod.innerHTML='';
}
function showEmptyInEl(el){
  el.innerHTML=`<div class="empty-state"><div class="e-icon">🏜️</div><p>Aucun membre enregistré pour le moment.<br>Inscris-toi pour apparaître ici !</p></div>`;
}

// ═══════════════════════════════
//  HERO STATS
// ═══════════════════════════════
function updateHeroStats(users,chatDB,musicMeta){
  const totalUsers=users.length;
  let totalMsgs=0;
  if(chatDB?.messages) Object.values(chatDB.messages).forEach(arr=>totalMsgs+=arr.length);
  const totalSounds=(musicMeta?.tracks||[]).length;
  const totalWins=users.reduce((s,u)=>s+(u.gameWins||0),0);

  document.getElementById('hero-stats').innerHTML=[
    {v:totalUsers,l:'Membres',c:'var(--g)'},
    {v:totalMsgs,l:'Messages',c:'var(--c)'},
    {v:totalWins,l:'Victoires',c:'var(--r)'},
    {v:totalSounds,l:'Sons',c:'var(--y)'},
  ].map(s=>`
    <div style="text-align:center;padding:14px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;">
      <div style="font-family:var(--fd);font-size:32px;letter-spacing:2px;color:${s.c};line-height:1;">${fmt(s.v)}</div>
      <div style="font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;">${s.l}</div>
    </div>`).join('');
}

// ═══════════════════════════════
//  NAV USER
// ═══════════════════════════════
function updateNavUser(){
  const navUser=document.getElementById('nav-user');
  if(!SESSION){navUser.style.display='none';return;}
  navUser.style.display='flex';
  const av=document.getElementById('nav-av');
  const prof=getProfile(SESSION.id);
  if(prof.avatarSrc){
    av.innerHTML=`<img src="${prof.avatarSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    av.style.background='none';
  } else {
    av.style.background=avGrad(SESSION.pseudo);
    av.textContent=avLetter(SESSION.pseudo);
  }
  document.getElementById('nav-name').textContent=SESSION.pseudo;
}

// ═══════════════════════════════
//  TABS
// ═══════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('on',s.id==='sec-'+tab));
}

// ═══════════════════════════════
//  SCROLL TO ME
// ═══════════════════════════════
function scrollToMe(){
  if(!SESSION) return;
  const activeTab=document.querySelector('.tab-btn.active')?.dataset.tab||'global';
  // Cherche la ligne du user courant dans la section active
  const rows=document.querySelectorAll('#sec-'+activeTab+' .rank-row.me');
  if(rows.length){
    rows[0].scrollIntoView({behavior:'smooth',block:'center'});
    rows[0].style.animation='none';
    rows[0].style.boxShadow='0 0 0 2px var(--g)';
    setTimeout(()=>{rows[0].style.boxShadow='';},2000);
  } else {
    // L'utilisateur est peut-être dans le podium
    const pods=document.querySelectorAll('#sec-'+activeTab+' .pod-item.me');
    if(pods.length) pods[0].scrollIntoView({behavior:'smooth',block:'center'});
  }
}

// ═══════════════════════════════
//  CURSOR
// ═══════════════════════════════
const cur=document.getElementById('cur');
const ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function tick(){
  cur.style.transform=`translate3d(${mx}px,${my}px,0) translate(-50%,-50%)`;
  rx+=(mx-rx)*.18;ry+=(my-ry)*.18;
  ring.style.transform=`translate3d(${rx}px,${ry}px,0) translate(-50%,-50%)`;
  requestAnimationFrame(tick);
})();
document.addEventListener('mouseover',e=>{
  if(e.target.closest('button,.pod-item,.rank-row')){
    cur.style.width='14px';cur.style.height='14px';
    ring.style.width='50px';ring.style.height='50px';
  } else {
    cur.style.width='10px';cur.style.height='10px';
    ring.style.width='34px';ring.style.height='34px';
  }
});

// ═══════════════════════════════
//  INIT
// ═══════════════════════════════
window.addEventListener('load',()=>buildAll());
</script>
